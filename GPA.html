<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart GPA Calculator</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6366f1;
            --dark: #0f172a;
            --card: #1e293b;
        }
        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input, select {
            background: #334155;
            border: 1px solid #475569;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="p-6 flex justify-between items-center glass sticky top-0 z-50">
        <div class="text-2xl font-bold text-indigo-500">
            <i class="fa-solid fa-graduation-cap mr-2"></i>EduCalc
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-10 max-w-3xl">
        
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold mb-2">GPA Calculator</h1>
            <p class="text-slate-400">Calculate your Grade Point Average easily.</p>
        </div>

        <!-- Calculator Card -->
        <div class="glass rounded-2xl p-6 shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Your Subjects</h2>
                <button onclick="resetCalculator()" class="text-sm text-red-400 hover:text-red-300">
                    <i class="fa-solid fa-trash mr-1"></i> Reset
                </button>
            </div>

            <!-- Table Header -->
            <div class="grid grid-cols-12 gap-4 text-sm text-slate-400 mb-2 font-bold px-4">
                <div class="col-span-5">Subject</div>
                <div class="col-span-3">Credits</div>
                <div class="col-span-3">Grade</div>
                <div class="col-span-1"></div>
            </div>

            <!-- Inputs List -->
            <div id="subjects-list" class="space-y-3 mb-6">
                <!-- Dynamic Inputs will appear here -->
            </div>

            <!-- Add Subject Button -->
            <button onclick="addSubject()" class="w-full py-3 border-2 border-dashed border-slate-600 text-slate-400 rounded-xl hover:border-indigo-500 hover:text-indigo-500 transition">
                <i class="fa-solid fa-plus mr-2"></i> Add Subject
            </button>
        </div>

        <!-- Result Section -->
        <div id="result-section" class="mt-8 glass rounded-2xl p-8 text-center hidden">
            <h3 class="text-xl text-slate-400 mb-2">Your GPA</h3>
            <div class="text-7xl font-bold text-indigo-500 mb-2" id="gpa-display">0.00</div>
            <p class="text-slate-400" id="percentage-display">0% Approx</p>
            
            <div class="mt-6 flex justify-center gap-4">
                <div class="bg-slate-800 px-6 py-3 rounded-lg">
                    <div class="text-xs text-slate-400">Total Credits</div>
                    <div class="font-bold text-lg" id="credits-display">0</div>
                </div>
                <div class="bg-slate-800 px-6 py-3 rounded-lg">
                    <div class="text-xs text-slate-400">Total Points</div>
                    <div class="font-bold text-lg" id="points-display">0</div>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="text-center py-8 text-slate-600 text-sm">
        &copy; 2026 EduCalc. Built by Ramesh Sathvi.
    </footer>

    <script>
        // --- 1. Configuration ---
        
        // Grade Points Scale (Can be modified)
        const gradeScale = {
            "A+": 4.0, "A": 4.0, "A-": 3.7,
            "B+": 3.3, "B": 3.0, "B-": 2.7,
            "C+": 2.3, "C": 2.0, "C-": 1.7,
            "D+": 1.3, "D": 1.0, "D-": 0.7,
            "F": 0.0
        };

        // Helper Data
        let subjectCount = 0;

        // --- 2. Main Functions ---

        function init() {
            // Add 3 default subjects on load
            addSubject();
            addSubject();
            addSubject();
        }

        function addSubject() {
            subjectCount++;
            const list = document.getElementById('subjects-list');
            
            const row = document.createElement('div');
            row.className = 'grid grid-cols-12 gap-4 items-center animate-fade-in';
            row.id = `row-${subjectCount}`;
            
            // Subject Name Input
            const subjectInput = `
                <div class="col-span-5">
                    <input type="text" placeholder="e.g. Maths" class="w-full p-2 rounded text-sm text-white">
                </div>
            `;

            // Credits Input
            const creditsInput = `
                <div class="col-span-3">
                    <input type="number" min="1" max="10" value="3" class="w-full p-2 rounded text-sm text-white text-center" onchange="calculateGPA()">
                </div>
            `;

            // Grade Select
            const gradeOptions = Object.keys(gradeScale).map(g => 
                `<option value="${g}" ${g === 'A' ? 'selected' : ''}>${g}</option>`
            ).join('');

            const gradeSelect = `
                <div class="col-span-3">
                    <select class="w-full p-2 rounded text-sm text-white" onchange="calculateGPA()">
                        ${gradeOptions}
                    </select>
                </div>
            `;

            // Delete Button
            const deleteBtn = `
                <div class="col-span-1 text-center">
                    <button onclick="removeRow('${row.id}')" class="text-slate-500 hover:text-red-500">
                        <i class="fa-solid fa-times"></i>
                    </button>
                </div>
            `;

            row.innerHTML = subjectInput + creditsInput + gradeSelect + deleteBtn;
            list.appendChild(row);
            
            calculateGPA();
        }

        function removeRow(id) {
            const row = document.getElementById(id);
            row.remove();
            calculateGPA();
        }

        function calculateGPA() {
            const rows = document.querySelectorAll('#subjects-list > div');
            
            let totalCredits = 0;
            let totalPoints = 0;

            rows.forEach(row => {
                const credits = parseFloat(row.querySelector('input[type="number"]').value) || 0;
                const grade = row.querySelector('select').value;
                const gradePoint = gradeScale[grade];

                if (credits > 0) {
                    totalCredits += credits;
                    totalPoints += (credits * gradePoint);
                }
            });

            const gpa = totalCredits > 0 ? (totalPoints / totalCredits).toFixed(2) : "0.00";
            const percentage = (gpa * 25).toFixed(1); // Rough conversion

            // Update UI
            document.getElementById('gpa-display').innerText = gpa;
            document.getElementById('percentage-display').innerText = `${percentage}% Approx`;
            document.getElementById('credits-display').innerText = totalCredits;
            document.getElementById('points-display').innerText = totalPoints.toFixed(1);

            // Show Result Section if there is data
            const resultSection = document.getElementById('result-section');
            if(totalCredits > 0) {
                resultSection.classList.remove('hidden');
            } else {
                resultSection.classList.add('hidden');
            }
        }

        function resetCalculator() {
            document.getElementById('subjects-list').innerHTML = '';
            document.getElementById('result-section').classList.add('hidden');
            subjectCount = 0;
            init();
        }

        // Initialize on load
        window.onload = init;

    </script>
</body>
</html>
